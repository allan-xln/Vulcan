name: vulcan

services:
  db:
    image: postgres:16-alpine
    container_name: vulcan-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vulcan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/supabase/local/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vulcan"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
